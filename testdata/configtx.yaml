---
Organizations:
  - &Org1MSP
    Name: Org1
    ID: Org1MSP
    MSPDir: ./crypto/peerOrganizations/Org1/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('Org1MSP.member')
      Writers:
        Type: Signature
        Rule: OR('Org1MSP.member')
      Endorsement:
        Type: Signature
        Rule: OR('Org1MSP.member')
      Admins:
        Type: Signature
        Rule: OR('Org1MSP.admin')
    AnchorPeers:
      - Host:
        Port: 5417
  - &Org2MSP
    Name: Org2
    ID: Org2MSP
    MSPDir: ./crypto/peerOrganizations/Org2/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('Org2MSP.member')
      Writers:
        Type: Signature
        Rule: OR('Org2MSP.member')
      Endorsement:
        Type: Signature
        Rule: OR('Org2MSP.member')
      Admins:
        Type: Signature
        Rule: OR('Org2MSP.admin')
    AnchorPeers:
      - Host:
        Port: 5417
  - &OrdererMSP
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: ./crypto/ordererOrganizations/OrdererOrg/msp
    Policies:
      Readers:
        Type: Signature
        Rule: OR('OrdererMSP.member')
      Writers:
        Type: Signature
        Rule: OR('OrdererMSP.member')
      Admins:
        Type: Signature
        Rule: OR('OrdererMSP.admin')
    OrdererEndpoints:
      - id=0,broadcast,deliver,127.0.0.1:7050

Channel: &ChannelDefaults
  Capabilities:
    V2_0: true
  Policies: &DefaultPolicies
    Readers:
      Type: ImplicitMeta
      Rule: ANY Readers
    Writers:
      Type: ImplicitMeta
      Rule: ANY Writers
    Admins:
      Type: ImplicitMeta
      Rule: MAJORITY Admins

Profiles:
  OrgsChannel:
    <<: *ChannelDefaults
    Orderer:
      OrdererType: etcdraft
      BatchTimeout: 1s
      BatchSize:
        MaxMessageCount: 500
        AbsoluteMaxBytes: 98 MB
        PreferredMaxBytes: 2 KB
      Capabilities:
        V2_0: true
      EtcdRaft:
        Options:
          TickInterval: 500ms
          SnapshotIntervalSize: 1 KB
        Consenters:
          - Host: 127.0.0.1
            Port: 5427
            ClientTLSCert: ./crypto/ordererOrganizations/OrdererOrg/orderers/orderer.example.com/tls/server.crt
            ServerTLSCert: ./crypto/ordererOrganizations/OrdererOrg/orderers/orderer.example.com/tls/server.crt
      Organizations:
        - *OrdererMSP
      Policies:
        Readers:
          Type: ImplicitMeta
          Rule: ANY Readers
        Writers:
          Type: ImplicitMeta
          Rule: ANY Writers
        Admins:
          Type: ImplicitMeta
          Rule: MAJORITY Admins
        BlockValidation:
          Type: ImplicitMeta
          Rule: ANY Writers
    Application:
      Capabilities:
        V2_5: true
      Organizations:
        - *Org1MSP
        - *Org2MSP
      Policies:
        Readers:
          Type: ImplicitMeta
          Rule: ANY Readers
        Writers:
          Type: ImplicitMeta
          Rule: ANY Writers
        Admins:
          Type: ImplicitMeta
          Rule: ANY Admins
        LifecycleEndorsement:
          Type: Signature
          Rule: AND ('Org1MSP.member')
        Endorsement:
          Type: ImplicitMeta
          Rule: ANY Endorsement
    Consortium: SampleConsortium
